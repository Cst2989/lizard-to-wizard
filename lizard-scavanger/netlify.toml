[build]
  command = "pnpm build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "pnpm dev:web"
  port = 8888
  targetPort = 5174
  autoLaunch = false

[functions]
  node_bundler = "esbuild"

# SPA fallback — every non-/api route serves index.html
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
